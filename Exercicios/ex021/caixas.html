<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
            background-color: burlywood;
            height: 300px;
            width: 300px;
            border-width:10px;
            border-style: solid;
            border-color: darkslategray;

            padding-top:10px ;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

        }

        a{
            border-width:2px;
            border-style: dashed;
            border-color: blue;
            padding-top:10px ;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

        }

    
    </style>
</head>
<body>
    <main>
        <h1>Exemplo de caixas box-level</h1>
        <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inlinne-level</a>.Vamos ver como tudo isso funciona</p>
    </main>
</body>
</html>
